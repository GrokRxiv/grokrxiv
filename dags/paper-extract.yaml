id: paper-extract
version: 1
accepts:
  - extractor
concurrency: 1
tools:
  - id: source_to_body
    executor: rust
    timeout_secs: 120
  - id: derive_metadata
    executor: rust
    timeout_secs: 30
  - id: derive_sections
    executor: rust
    timeout_secs: 30
  - id: derive_equations
    executor: rust
    timeout_secs: 120
  - id: derive_references
    executor: rust
    timeout_secs: 120
  - id: derive_theorems
    executor: rust
    timeout_secs: 120
roles:
  - id: vlm_extractor
    kind: extractor
    config: agents/extraction/vlm.yaml
  - id: macro_expander
    kind: extractor
    config: agents/extraction/macros.yaml
  - id: equation_canonicalizer
    kind: extractor
    config: agents/extraction/equations.yaml
  - id: theorem_graph_extractor
    kind: extractor
    config: agents/extraction/theorems.yaml
  - id: citation_contextualizer
    kind: extractor
    config: agents/extraction/citations.yaml
nodes:
  - id: paper_ingest
    kind: dag_call
    dag_type: paper-ingest
    outputs: [source.tar.gz, original.pdf, source_manifest.json]
    required: true
  - id: source_to_body
    kind: tool
    tool: source_to_body
    inputs: [source.tar.gz, original.pdf]
    outputs: [body.md, semantic_ast.json]
    required: true
  - id: derive_metadata
    kind: tool
    tool: derive_metadata
    inputs: [source_to_body]
    outputs: [metadata.json]
    required: true
  - id: derive_sections
    kind: tool
    tool: derive_sections
    inputs: [body.md]
    outputs: [sections.json]
    required: true
  - id: derive_equations
    kind: tool
    tool: derive_equations
    inputs: [body.md, semantic_ast.json]
    outputs: [equations.json]
    required: true
  - id: derive_references
    kind: tool
    tool: derive_references
    inputs: [body.md, refs.bib]
    outputs: [references.json]
    required: true
  - id: derive_theorems
    kind: tool
    tool: derive_theorems
    inputs: [body.md, semantic_ast.json]
    outputs: [theorem_graph.json]
  - id: materialize_review_input
    kind: artifact
  - id: vlm_extractor
    kind: agent
    role: vlm_extractor
  - id: macro_expander
    kind: agent
    role: macro_expander
  - id: equation_canonicalizer
    kind: agent
    role: equation_canonicalizer
  - id: theorem_graph_extractor
    kind: agent
    role: theorem_graph_extractor
  - id: citation_contextualizer
    kind: agent
    role: citation_contextualizer
  - id: citation_validation
    kind: dag_call
    dag_type: citation-validation
    inputs: [references.json]
    outputs: [citation_validation_report.json, citation_validation_adjudication.json]
  - id: paper_review
    kind: dag_call
    dag_type: paper-review
edges:
  - from: paper_ingest
    to: source_to_body
  - from: source_to_body
    to:
      - derive_metadata
      - derive_sections
      - derive_equations
      - derive_references
      - derive_theorems
  - from:
      - derive_metadata
      - derive_sections
      - derive_equations
      - derive_references
      - derive_theorems
    to: materialize_review_input
  - from: derive_references
    to: citation_validation
  - from: paper_ingest
    to: vlm_extractor
  - from: source_to_body
    to: macro_expander
  - from: macro_expander
    to: equation_canonicalizer
  - from: equation_canonicalizer
    to: theorem_graph_extractor
  - from: theorem_graph_extractor
    to: citation_contextualizer
  - from:
      - vlm_extractor
      - citation_contextualizer
      - citation_validation
      - materialize_review_input
    to: paper_review

id: novelty
role: "Assess novelty against related work; figure-aware (multimodal)."
provider: gemini
# Two reasons we stay on flash here, even on a paid Google Cloud project:
#   1. gemini-2.5-pro spends ~6K of max_tokens on hidden chain-of-thought,
#      leaving zero tokens for output and yielding an empty `text` body with
#      finishReason=MAX_TOKENS (see crates/orchestrator/src/agents/runners/
#      api.rs for the instrumentation that surfaced this).
#   2. Free-tier AI Studio keys still have 0/v1beta quota on pro.
# Flash has no reasoning overhead and produced verifier_status=pass on every
# prior smoke run.
model: gemini-2.5-flash
runner: cli
prompt_template: prompts/novelty.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/novelty_review.schema.json
verifiers:
  - json_schema
  - tone
max_retries: 2
timeout_secs: 150
escalation: human

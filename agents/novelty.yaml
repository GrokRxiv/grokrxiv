id: novelty
role: "Assess novelty against related work; figure-aware (multimodal)."
provider: gemini
# Free-tier AI Studio keys do not have quota for gemini-2.5-pro by default
# (limit: 0 in /v1beta). Flash works on free tier and is plenty capable for
# novelty assessment; flip to 2.5-pro after enabling billing on the Google
# Cloud project tied to this key.
model: gemini-2.5-flash
prompt_template: prompts/novelty.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/novelty_review.schema.json
verifiers:
  - json_schema
  - tone
max_retries: 2
timeout_secs: 150
escalation: human

id: citation
role: "Verify each bibliography entry exists and is relevantly cited."
provider: gemini
# gemini-2.5-pro spends ~6K of its max_tokens budget on hidden chain-of-thought
# ("thoughtsTokenCount"), leaving zero tokens for actual output and yielding an
# empty `text` body with finishReason=MAX_TOKENS. Flash has no such reasoning
# overhead and produced verifier_status=pass on every prior smoke run.
model: gemini-2.5-flash
runner: cli
prompt_template: prompts/citation.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/citation_review.schema.json
verifiers:
  - json_schema
  - citation_existence
max_retries: 2
timeout_secs: 120
escalation: human

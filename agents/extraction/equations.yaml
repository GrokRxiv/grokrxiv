id: equation_canonicalizer
role: "Stage 5 — canonicalise every equation in the paper into a normalised TeX form, MathML rendering, and a short semantic tag."
provider: gemini
# gemini-2.5-pro burns ~6K of its max_tokens budget on hidden chain-of-thought,
# which left zero tokens for actual output on tool-call turns and caused
# "stopped without submit()" failures in the H2 smoke. Flash has no reasoning
# overhead and emits tool calls reliably; equation canonicalisation is mostly
# deterministic TeX munging that doesn't benefit from extended thinking.
model: gemini-2.5-flash
runner: cli
prompt_template: prompts/extraction/equations.md
output_schema: schemas/extraction/equations.schema.json
verifiers:
  - json_schema
max_iters: 60
max_cost_usd: 0.50
max_retries: 2
timeout_secs: 600
escalation: skip

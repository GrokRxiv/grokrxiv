id: reproducibility
role: "Assess code/data availability and reproducibility of empirical claims."
provider: gemini
# Keep the default CLI-only review path on the locally installed Gemini CLI.
# Codex remains supported via explicit config/overrides, but the subscription
# quota can block live E2E runs before moderation.
model: gemini-2.5-flash
runner: cli
prompt_template: prompts/reproducibility.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/reproducibility_review.schema.json
verifiers:
  - json_schema
  - tone
max_retries: 2
timeout_secs: 120
escalation: skip

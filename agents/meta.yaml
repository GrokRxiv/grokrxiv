id: review_dag
description: "Orchestration DAG for the GrokRxiv specialist review pipeline."
# Provider notes:
#   - vLLM/local providers are reached via an EXTERNAL endpoint, never an
#     internal Railway service URL. Recommended VLLM_BASE_URL values:
#       https://your-modal-endpoint.modal.run/v1
#       https://api.together.xyz/v1
#     Do NOT point VLLM_BASE_URL at `http://railway-internal:...`.
#   - The OpenAI-family provider is referred to as `openai` (not `codex`).

nodes:
  - summary
  - technical_correctness
  - novelty
  - reproducibility
  - citation
  - meta_reviewer
edges:
  - { from: summary,               to: meta_reviewer }
  - { from: technical_correctness, to: meta_reviewer }
  - { from: novelty,               to: meta_reviewer }
  - { from: reproducibility,       to: meta_reviewer }
  - { from: citation,              to: meta_reviewer }
concurrency: 4

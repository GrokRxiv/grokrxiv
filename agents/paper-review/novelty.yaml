id: novelty
kind: critic
role: "Assess novelty against related work; figure-aware (multimodal)."
provider: gemini
# Default can be overridden with GROKRXIV_NOVELTY_MODEL or
# `--model-for novelty=<model>`.
model: gemini-3-flash-preview
runner: cli
prompt_template: prompts/novelty.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/novelty_review.schema.json
verifiers:
  - json_schema
  - tone
prompt_context:
  body_budget_chars: 120000
  bibliography: full
  fact_blocks:
    - novelty_prior_art
postprocessors:
  - merge_novelty_facts
max_retries: 2
timeout_secs: 360
escalation: agent

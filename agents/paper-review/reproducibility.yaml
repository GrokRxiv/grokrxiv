id: reproducibility
kind: critic
role: "Assess code/data availability and reproducibility of empirical claims."
provider: openai
# Default can be overridden with GROKRXIV_REPRODUCIBILITY_MODEL or
# `--model-for reproducibility=<model>`.
model: gpt-5.5
runner: cli
prompt_template: prompts/reproducibility.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/reproducibility_review.schema.json
verifiers:
  - json_schema
  - tone
prompt_context:
  body_budget_chars: 80000
  bibliography: full
  fact_blocks:
    - reproducibility_availability
system_overlays:
  - proof_as_code_reproducibility
postprocessors:
  - merge_reproducibility_facts
max_retries: 2
timeout_secs: 240
escalation: skip

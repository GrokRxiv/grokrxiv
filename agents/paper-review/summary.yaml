id: summary
kind: critic
role: "Plain-language summary of the paper for a literate non-expert."
provider: claude
# Plain-language TL;DR is a Haiku-class task — ~15× cheaper than Opus per
# token. Bump to Sonnet/Opus if quality regresses.
model: claude-haiku-4-5-20251001
runner: cli
prompt_template: prompts/summary.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/summary_review.schema.json
verifiers:
  - json_schema
  - tone
prompt_context:
  body_budget_chars: 48000
  bibliography: full
max_retries: 2
timeout_secs: 90
escalation: skip

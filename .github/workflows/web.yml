# Required: Codex review must also pass — see codex-review.yml
name: web

on:
  push:
    branches: [main]
    paths:
      - "agenthero/apps/grokrxiv/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "agenthero/apps/grokrxiv/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/web.yml"

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @grokrxiv/web typecheck

      - name: Lint
        run: pnpm --filter @grokrxiv/web lint

      - name: Build
        run: pnpm --filter @grokrxiv/web build

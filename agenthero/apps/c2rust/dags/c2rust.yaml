id: c2rust
version: 1
accepts:
  - extractor
  - code_generator
  - verifier
concurrency: 1
roles:
  - id: ast_extract
    kind: extractor
  - id: idiom_translate
    kind: code_generator
  - id: compile_check
    kind: verifier
  - id: lint_pass
    kind: verifier
nodes:
  - id: ast_extract
    kind: agent
    role: ast_extract
    outputs:
      - migration/ast.json
  - id: idiom_translate
    kind: agent
    role: idiom_translate
    inputs:
      - migration/ast.json
    outputs:
      - migration/translated.rs
      - migration/translation_report.json
  - id: compile_check
    kind: verify
    role: compile_check
    inputs:
      - migration/translated.rs
      - migration/translation_report.json
    outputs:
      - verification/compile_check.json
  - id: lint_pass
    kind: verify
    role: lint_pass
    inputs:
      - verification/compile_check.json
    outputs:
      - verification/lint_report.json
      - migration_report.md
edges:
  - from: ast_extract
    to: idiom_translate
  - from: idiom_translate
    to: compile_check
  - from: compile_check
    to: lint_pass

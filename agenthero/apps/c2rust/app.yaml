version: 1
slug: c2rust
label: C2Rust
description: C to Rust migration DAG app.
adapter:
  kind: process
  command: agenthero-dag-app-c2rust
  fallback_command: cargo
  fallback_args: ["run", "--manifest-path", "agenthero/apps/c2rust/rust/Cargo.toml", "--quiet", "--"]
  timeout_secs: 900
  output_limit_bytes: 1048576
observability:
  events: true
  logs: true
  status: true
  event_stream: true
  lifecycle_events:
    - app_action.started
    - app_action.completed
    - app_action.failed
  trace_fields:
    - app_run_id
    - dag_run_id
    - node_id
    - attempt
    - node_kind
    - tool_id
    - manifest_hash
    - artifact_id
    - lease_id
    - status
    - exit_status
    - duration_ms
actions:
  - id: migrate
    command: [migrate]
    dag_type: c2rust
    description: Translate and validate a C source through the C2Rust DAG.
    options:
      - name: source
        kind: positional
        value_name: C_FILE_OR_PROJECT
        required: true
        description: C source file or project root to migrate.

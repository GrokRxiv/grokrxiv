<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">GrokRxiv</title>
  <desc id="desc">A paper icon connected to typed review DAG nodes.</desc>
  <defs>
    <style>
      .tile { fill: #f8fafc; stroke: #d8e0ea; }
      .paper { fill: #ffffff; }
      .fold { fill: #e7eef7; }
      .ink { stroke: #0f172a; }
      .rule { stroke: #64748b; }
      .teal { stroke: #0f766e; }
      .node { stroke: #ffffff; }
      .synthesis { fill: #d97706; }
      @media (prefers-color-scheme: dark) {
        .tile { fill: #eaf2fb; stroke: #ffffff; }
        .paper { fill: #f8fafc; }
        .fold { fill: #dbe7f4; }
        .ink { stroke: #020617; }
        .rule { stroke: #64748b; }
        .teal { stroke: #14b8a6; }
      }
    </style>
    <filter id="tileShadow" x="32" y="32" width="960" height="960" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity=".12" />
    </filter>
  </defs>

  <g filter="url(#tileShadow)">
    <rect x="76" y="76" width="872" height="872" rx="196" class="tile" stroke-width="34" />
  </g>

  <path d="M286 176h346l150 150v520H286V176Z" class="paper" />
  <path d="M632 176v110c0 22 18 40 40 40h110L632 176Z" class="fold" />
  <path d="M286 176h346l150 150v520H286V176Z" fill="none" class="ink" stroke-width="42" stroke-linejoin="round" />
  <path d="M632 176v110c0 22 18 40 40 40h110" fill="none" class="ink" stroke-width="34" stroke-linejoin="round" />

  <g fill="none" class="rule" stroke-linecap="round" stroke-width="32" opacity=".45">
    <path d="M384 438h250" />
    <path d="M384 536h176" />
  </g>

  <g fill="none" class="teal" stroke-linecap="round" stroke-linejoin="round" stroke-width="40">
    <path d="M408 736 520 652 632 736" />
    <path d="M520 652V532" />
    <path d="M520 652h166" />
  </g>

  <g class="node" stroke-width="30">
    <circle cx="520" cy="532" r="58" fill="#14b8a6" />
    <circle cx="408" cy="736" r="58" fill="#14b8a6" />
    <circle cx="632" cy="736" r="58" fill="#14b8a6" />
    <circle cx="686" cy="652" r="66" class="synthesis" />
  </g>

  <path d="M670 623h32v58h-32zM644 652h84" fill="none" class="ink" stroke-linecap="round" stroke-linejoin="round" stroke-width="24" />
</svg>

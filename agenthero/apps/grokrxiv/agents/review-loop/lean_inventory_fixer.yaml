id: lean_inventory_fixer
kind: code_generator
role: "Fix full Lean code from one theorem_inventory source packet using compiler diagnostics."
provider: claude
model: opus[1m]
runner: cli
prompt_template: prompts/review-loop/lean_inventory_fixer.md
input_schema: schemas/review_loop_code_task.schema.json
output_schema: schemas/review_loop_code_artifact.schema.json
verifiers:
  - json_schema
max_retries: 1
timeout_secs: 0
escalation: agent

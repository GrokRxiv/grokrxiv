id: haskell_code_reviewer
kind: verifier
role: "Codex review of generated Haskell semantic-model code and GHC diagnostics."
provider: openai
model: gpt-5.5
runner: cli
prompt_template: prompts/review-loop/haskell_code_reviewer.md
input_schema: schemas/review_loop_code_task.schema.json
output_schema: schemas/review_loop_code_review.schema.json
verifiers:
  - json_schema
max_retries: 1
timeout_secs: 300
escalation: agent

id: haskell_semantic_author
kind: code_generator
role: "Generate a Haskell semantic model from paper-derived GrokRxiv review claims."
provider: claude
model: claude-opus-4-7
runner: cli
prompt_template: prompts/review-loop/haskell_semantic_author.md
input_schema: schemas/review_loop_code_task.schema.json
output_schema: schemas/review_loop_code_artifact.schema.json
verifiers:
  - json_schema
max_retries: 1
timeout_secs: 600
escalation: agent

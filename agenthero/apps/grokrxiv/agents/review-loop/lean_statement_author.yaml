id: lean_statement_author
kind: code_generator
role: "Author faithful Lean theorem statements from source TeX, typed-IR scaffolding, and paper-local context before proof search."
provider: claude
model: claude-opus-4-8
runner: cli
prompt_template: prompts/review-loop/lean_statement_author.md
input_schema: schemas/review_loop_code_task.schema.json
output_schema: schemas/lean_statement_author.schema.json
verifiers:
  - json_schema
max_retries: 1
timeout_secs: 600
escalation: agent

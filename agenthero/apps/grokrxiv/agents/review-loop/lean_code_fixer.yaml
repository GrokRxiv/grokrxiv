id: lean_code_fixer
kind: code_generator
role: "Fix generated Lean proof code using compiler diagnostics and Codex review."
provider: claude
model: claude-opus-4-8
runner: cli
prompt_template: prompts/review-loop/lean_code_fixer.md
input_schema: schemas/review_loop_code_task.schema.json
output_schema: schemas/review_loop_code_artifact.schema.json
verifiers:
  - json_schema
max_retries: 1
timeout_secs: 600
escalation: agent

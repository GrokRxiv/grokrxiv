id: citation
kind: critic
role: "Assess the rendered citation contexts and bibliography sample for relevance and missing prior work."
provider: claude
# Defaults can be overridden with GROKRXIV_CITATION_PROVIDER /
# GROKRXIV_CITATION_MODEL or `--provider-for citation=<provider>` /
# `--model-for citation=<model>`.
model: sonnet[1m]
runner: cli
prompt_template: prompts/citation.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/citation_review.schema.json
verifiers:
  - json_schema
  - citation_existence
prompt_context:
  body_budget_chars: 30000
  bibliography: limited
  max_bibliography_entries: 32
  citation_context_budget_chars: 30000
postprocessors:
  - merge_citation_verifier
max_retries: 2
timeout_secs: 900
escalation: agent

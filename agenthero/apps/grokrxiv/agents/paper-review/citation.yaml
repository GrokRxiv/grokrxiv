id: citation
kind: critic
role: "Verify each bibliography entry exists and is relevantly cited."
provider: gemini
# Default can be overridden with GROKRXIV_CITATION_MODEL or
# `--model-for citation=<model>`.
model: gemini-2.5-pro
runner: cli
prompt_template: prompts/citation.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/citation_review.schema.json
verifiers:
  - json_schema
  - citation_existence
prompt_context:
  body_budget_chars: 0
  bibliography: limited
  max_bibliography_entries: 24
  citation_context_budget_chars: 12000
postprocessors:
  - merge_citation_verifier
max_retries: 2
timeout_secs: 360
escalation: agent

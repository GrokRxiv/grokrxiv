id: theorem_graph_extractor
kind: extractor
role: "Build a dependency graph over theorem-like blocks (theorem/lemma/proposition/corollary/definition/proof). Resolves \\ref{} edges."
provider: claude
# Claude Opus for faithful full theorem extraction -> downstream Lean. Fast Flash models are
# reserved for the smaller formalize typed-IR transcription pass. The earlier failures were NOT the model: the
# tool_loop was killed by a 360s timeout and a phantom per-token cost ceiling, both of which
# are meaningless on the $0 subscription CLI path and are now lifted for CLI runs (see
# run_agent_safe). Codex/openai is not a valid tool_loop backend (build_tool_command bails),
# so Claude is the strong option for this extraction agent.
model: claude-opus-4-8
runner: cli
execution_mode: tool_loop
prompt_template: prompts/extraction/theorems.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/extraction/theorems.schema.json
tools:
  - read_file
  - query_ast
  - list_sections
  - read_section
  - resolve_label
  - submit
max_iters: 50
max_cost_usd: 100.0
timeout_secs: 2400

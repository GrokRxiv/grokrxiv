id: macro_expander
kind: extractor
role: "Stage 4 — expand user-defined LaTeX macros (\\newcommand / \\def / \\renewcommand / \\DeclareMathOperator) so downstream tools see standard LaTeX."
provider: gemini
# Macro expansion is mechanical bookkeeping over short TeX snippets. Keep it on
# the local Gemini-family CLI path by default; direct provider APIs remain
# opt-in.
model: gemini-2.5-flash
runner: cli
execution_mode: tool_loop
prompt_template: prompts/extraction/macros.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/extraction/macros.schema.json
tools:
  - list_files
  - read_file
  - find_definitions
  - apply_expansions
  - submit
max_iters: 20
max_cost_usd: 0.40
max_retries: 2
timeout_secs: 120

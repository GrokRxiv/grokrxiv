id: citation_contextualizer
kind: extractor
role: "Stage 7: enrich every citation with resolved bibliographic metadata (CrossRef + arXiv, never invented) and classify each use site semantically."
provider: gemini
# Same gemini-2.5-pro reasoning-token starvation as in citation.yaml: pro
# emitted no tool calls (stopped without submit) under our 4K tool-loop budget.
# Flash works reliably for the lookup-heavy citation enrichment loop.
model: gemini-2.5-flash
runner: cli
execution_mode: tool_loop
prompt_template: prompts/extraction/citations.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/extraction/citations.schema.json
tools:
  - list_citation_sites
  - lookup_bibtex
  - crossref_lookup
  - openalex_lookup
  - arxiv_lookup
  - search_corpus
  - read_section
  - submit
max_iters: 80
max_cost_usd: 0.50
max_retries: 2
timeout_secs: 240

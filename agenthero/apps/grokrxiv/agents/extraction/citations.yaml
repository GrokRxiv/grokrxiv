id: citation_contextualizer
kind: extractor
role: "Stage 7: enrich every citation with resolved bibliographic metadata (CrossRef + arXiv, never invented) and classify each use site semantically."
provider: claude
# Defaults can be overridden with GROKRXIV_CITATION_CONTEXTUALIZER_PROVIDER /
# GROKRXIV_CITATION_CONTEXTUALIZER_MODEL or the role-level CLI override flags.
model: claude-sonnet-4-6
runner: cli
execution_mode: tool_loop
prompt_template: prompts/extraction/citations.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/extraction/citations.schema.json
tools:
  - list_citation_sites
  - lookup_bibtex
  - crossref_lookup
  - openalex_lookup
  - arxiv_lookup
  - search_corpus
  - read_section
  - submit
max_iters: 80
max_cost_usd: 0.50
max_retries: 2
timeout_secs: 240

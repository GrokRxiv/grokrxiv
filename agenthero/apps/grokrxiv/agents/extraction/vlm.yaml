id: vlm_extractor
kind: extractor
role: "Stage 3: extract paper structure from a PDF when no TeX source is available."
provider: gemini
model: gemini-2.5-pro
runner: cli
execution_mode: tool_loop
prompt_template: prompts/extraction/vlm.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/extraction/vlm.schema.json
tools:
  - read_pdf_page
  - search_pdf
  - extract_page_region
  - submit
max_iters: 40
max_cost_usd: 1.0
max_retries: 2
timeout_secs: 300

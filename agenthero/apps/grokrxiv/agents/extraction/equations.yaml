id: equation_canonicalizer
kind: extractor
role: "Stage 5 — canonicalise every equation in the paper into a normalised TeX form, MathML rendering, and a short semantic tag."
provider: claude
# Defaults can be overridden with GROKRXIV_EQUATION_CANONICALIZER_PROVIDER /
# GROKRXIV_EQUATION_CANONICALIZER_MODEL or the role-level CLI override flags.
model: claude-haiku-4-5
runner: cli
execution_mode: tool_loop
prompt_template: prompts/extraction/equations.md
input_schema: schemas/paper_extract.schema.json
output_schema: schemas/extraction/equations.schema.json
verifiers:
  - json_schema
tools:
  - read_section
  - query_ast
  - submit
max_iters: 60
max_cost_usd: 0.50
max_retries: 2
timeout_secs: 600
escalation: skip

# infra/litellm/config.yaml
# LiteLLM gateway router — Mac local topology.
# In cloud topology, use config.cloud.yaml which points at containerized
# ollama/vllm services rather than host.docker.internal.

model_list:
  # Local Ollama (Mac native host) — available to provider-gateway experiments.
  - model_name: qwen-32b
    litellm_params:
      model: ollama/qwen2.5:32b-instruct-q4_K_M
      api_base: http://host.docker.internal:11434

  - model_name: llama-8b
    litellm_params:
      model: ollama/llama3.1:8b-instruct-q4_K_M
      api_base: http://host.docker.internal:11434

  - model_name: deepseek-coder-lite
    litellm_params:
      model: ollama/deepseek-coder-v2:16b
      api_base: http://host.docker.internal:11434

  # Frontier APIs — optional pass-through (the api runner uses these directly)
  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: True
  set_verbose: False
  json_logs: True

router_settings:
  redis_host: redis
  redis_port: 6379
  routing_strategy: simple-shuffle
  retry_after: 1
  num_retries: 2

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

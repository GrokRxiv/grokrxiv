# GrokRxiv — local-dev stack (orchestrator + web).
#
# Postgres + Storage + Auth + Studio are provided by the Supabase CLI's own
# Docker stack (`supabase start`), which mirrors the production environment.
# This compose file adds the two services that aren't part of Supabase:
#
#   * orchestrator — Rust HTTP API + tokio supervisor (the same binary you
#                    get from `cargo build`). Mounts ./agents, ./schemas,
#                    ./prompts read-only and the sibling grokrxiv-data repo for
#                    local artifact writes.
#   * web          — Next.js dev server with HMR.
#
# Usage:
#
#   # 1. Start Supabase (Postgres on :54322, Storage on :54321, Studio :54323):
#   supabase start
#
#   # 2. Configure root .env plus the .env_<purpose> files it lists. Before
#   #    compose, export the includes so docker-compose interpolation sees them:
#   #    set -a; source .env; for f in ${AGENTHERO_ENV_FILES//,/ }; do source "$f"; done; set +a
#
#   # 3. Bring up orchestrator + web:
#   docker compose -f agenthero/apps/grokrxiv/infra/docker-compose.yml up --build
#
#   # Visit http://localhost:3000.
#
# This stack is for local development only. Production deploys use Vercel
# (web), Railway (orchestrator), and Supabase Cloud (Postgres + Storage).

name: grokrxiv

services:
  orchestrator:
    # Prefer native ARM on Apple Silicon. If a dependency/image is unavailable
    # for ARM, set GROKRXIV_ORCHESTRATOR_PLATFORM=linux/amd64.
    platform: "${GROKRXIV_ORCHESTRATOR_PLATFORM:-linux/arm64}"
    build:
      context: ../../../..
      dockerfile: agenthero/apps/grokrxiv/infra/docker/orchestrator.Dockerfile
      args:
        INSTALL_PANDOC: "${GROKRXIV_DOCKER_INSTALL_PANDOC:-1}"
        INSTALL_AGENT_CLIS: "${GROKRXIV_DOCKER_INSTALL_AGENT_CLIS:-1}"
    container_name: grokrxiv-orchestrator
    environment:
      ORCHESTRATOR_BIND: "0.0.0.0:8080"
      # Talk to the Supabase CLI's Postgres on the host. `host.docker.internal`
      # resolves to the macOS/Windows host's loopback inside containers.
      DATABASE_URL: "postgres://postgres:postgres@host.docker.internal:54322/postgres"
      SUPABASE_URL: "${SUPABASE_INTERNAL_URL:-http://host.docker.internal:54321}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      # Do not inherit the host's absolute GROKRXIV_DATA_REPO_PATH here; inside
      # Docker the repo is mounted at the container path below.
      AGENTHERO_APPS_ROOT: "/etc/agenthero/apps"
      AGENTHERO_AGENTS_DIR: "/etc/agenthero/apps/grokrxiv/agents"
      AGENTHERO_DAGS_DIR: "/etc/agenthero/apps/grokrxiv/dags"
      GROKRXIV_DATA_REPO_PATH: "${GROKRXIV_DOCKER_DATA_REPO_PATH:-/workspace/grokrxiv-data}"
      AGENTHERO_RUNNER: "${AGENTHERO_RUNNER:-cli}"
      AGENTHERO_EXTRACTOR: "${AGENTHERO_EXTRACTOR:-cli}"
      GROKRXIV_DISABLE_SCHEDULER: "${GROKRXIV_DISABLE_SCHEDULER:-0}"
      AGENTHERO_ALLOW_PROVIDER_API: "${AGENTHERO_ALLOW_PROVIDER_API:-0}"
      GROKRXIV_REQUIRE_CLI_AUTH: "${GROKRXIV_REQUIRE_CLI_AUTH:-1}"
      GROKRXIV_SUMMARY_MODEL: "${GROKRXIV_SUMMARY_MODEL:-claude-haiku-4-5-20251001}"
      GROKRXIV_TECHNICAL_CORRECTNESS_MODEL: "${GROKRXIV_TECHNICAL_CORRECTNESS_MODEL:-claude-opus-4-7}"
      GROKRXIV_NOVELTY_MODEL: "${GROKRXIV_NOVELTY_MODEL:-sonnet[1m]}"
      GROKRXIV_REPRODUCIBILITY_MODEL: "${GROKRXIV_REPRODUCIBILITY_MODEL:-gpt-5.5}"
      GROKRXIV_CITATION_MODEL: "${GROKRXIV_CITATION_MODEL:-claude-haiku-4-5-20251001}"
      GROKRXIV_META_REVIEWER_MODEL: "${GROKRXIV_META_REVIEWER_MODEL:-sonnet[1m]}"
      GROKRXIV_SUMMARY_TIMEOUT_SECS: "${GROKRXIV_SUMMARY_TIMEOUT_SECS:-90}"
      GROKRXIV_TECHNICAL_CORRECTNESS_TIMEOUT_SECS: "${GROKRXIV_TECHNICAL_CORRECTNESS_TIMEOUT_SECS:-600}"
      GROKRXIV_NOVELTY_TIMEOUT_SECS: "${GROKRXIV_NOVELTY_TIMEOUT_SECS:-360}"
      GROKRXIV_REPRODUCIBILITY_TIMEOUT_SECS: "${GROKRXIV_REPRODUCIBILITY_TIMEOUT_SECS:-240}"
      GROKRXIV_CITATION_TIMEOUT_SECS: "${GROKRXIV_CITATION_TIMEOUT_SECS:-900}"
      GROKRXIV_META_REVIEWER_TIMEOUT_SECS: "${GROKRXIV_META_REVIEWER_TIMEOUT_SECS:-300}"
      GROKRXIV_PREVIEW_PROVIDER: "${GROKRXIV_PREVIEW_PROVIDER:-gemini}"
      GROKRXIV_PREVIEW_MODEL: "${GROKRXIV_PREVIEW_MODEL:-gemini-3-flash-preview}"
      GROKRXIV_PREVIEW_TIMEOUT_SECS: "${GROKRXIV_PREVIEW_TIMEOUT_SECS:-120}"
      GROKRXIV_GEMINI_AUTH_TYPE: "${GROKRXIV_GEMINI_AUTH_TYPE:-oauth-personal}"
      # Local compose must not inherit paid provider API keys from the host
      # shell. Direct provider APIs are explicit opt-in for API-backend tests.
      ANTHROPIC_API_KEY: "${GROKRXIV_DOCKER_ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${GROKRXIV_DOCKER_OPENAI_API_KEY:-}"
      GOOGLE_GENERATIVE_AI_API_KEY: "${GROKRXIV_DOCKER_GOOGLE_GENERATIVE_AI_API_KEY:-}"
      VLLM_BASE_URL: "${VLLM_BASE_URL:-}"
      ARXIV_USER_AGENT: "${ARXIV_USER_AGENT:-GrokRxiv/0.1 (+local-dev)}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GROKRXIV_REVIEWS_OWNER: "${GROKRXIV_REVIEWS_OWNER:-GrokRxiv}"
      GROKRXIV_REVIEWS_REPO: "${GROKRXIV_REVIEWS_REPO:-grokrxiv-reviews}"
      GROKRXIV_PUBLIC_REVIEWS_REPO: "${GROKRXIV_PUBLIC_REVIEWS_REPO:-GrokRxiv/grokrxiv-reviews}"
      GROKRXIV_PRIVATE_REVIEWS_REPO: "${GROKRXIV_PRIVATE_REVIEWS_REPO:-GrokRxiv/grokrxiv-private-reviews}"
      GROKRXIV_PUBLIC_URL: "${GROKRXIV_PUBLIC_URL:-https://grokrxiv.org}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-local-dev-secret}"
      WEB_REVALIDATE_URL: "http://web:3000/api/revalidate"
      REVALIDATE_SECRET: "${REVALIDATE_SECRET:-local-dev-revalidate-secret}"
      RUST_LOG: "info,grokrxiv_app_runtime=debug,agenthero_orchestrator=debug"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - ../../../../agenthero/apps/grokrxiv/app.yaml:/etc/agenthero/apps/grokrxiv/app.yaml:ro
      - ../../../../agenthero/apps/grokrxiv/dags:/etc/agenthero/apps/grokrxiv/dags:ro
      - ../../../../agenthero/apps/grokrxiv/agents:/etc/agenthero/apps/grokrxiv/agents:ro
      - ../../../../agenthero/apps/grokrxiv/schemas:/etc/agenthero/apps/grokrxiv/schemas:ro
      - ../../../../agenthero/apps/grokrxiv/prompts:/etc/agenthero/apps/grokrxiv/prompts:ro
      - ${GROKRXIV_DOCKER_DATA_REPO_SOURCE:-../../../../../grokrxiv-data}:${GROKRXIV_DOCKER_DATA_REPO_PATH:-/workspace/grokrxiv-data}
      # Provider CLI auth is mounted read-only, copied into /home/grokrxiv at
      # container startup, and never baked into the image.
      - ${HOME}/.claude.json:/run/secrets/grokrxiv-cli-auth/.claude.json:ro
      - ${HOME}/.claude/docker-claude-code-credentials.secret:/run/secrets/grokrxiv-cli-auth/.claude/docker-claude-code-credentials.secret:ro
      - ${HOME}/.codex/auth.json:/run/secrets/grokrxiv-cli-auth/.codex/auth.json:ro
      - ${HOME}/.gemini/antigravity-cli:/run/secrets/grokrxiv-cli-auth/.gemini/antigravity-cli:ro
      - ${HOME}/.gemini/antigravity:/run/secrets/grokrxiv-cli-auth/.gemini/antigravity:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "GROKRXIV_DOCTOR_REQUIRE_RUNNER=0 /usr/local/bin/orchestrator doctor >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    image: node:20-alpine
    # Prefer native ARM on Apple Silicon. If a local image/dependency is not
    # available for ARM, set GROKRXIV_WEB_PLATFORM=linux/amd64 to run under
    # Docker Desktop emulation.
    platform: "${GROKRXIV_WEB_PLATFORM:-linux/arm64}"
    container_name: grokrxiv-web
    depends_on:
      orchestrator:
        condition: service_started
    working_dir: /workspace/agenthero/apps/grokrxiv/web
    environment:
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      # Browser-facing URL. This is compiled into the client bundle, so it
      # must be reachable from Chrome/Safari on the host.
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}"
      # Server-side URL for the Docker container to reach the host Supabase CLI.
      SUPABASE_INTERNAL_URL: "${SUPABASE_INTERNAL_URL:-http://host.docker.internal:54321}"
      # Supabase CLI local-dev keys. Override these from .env for cloud/staging.
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU}"
      # Inside the docker network, web reaches the orchestrator by service name.
      ORCHESTRATOR_INTERNAL_URL: "http://orchestrator:8080"
      AGENTHERO_SERVICE_TOKEN: "${AGENTHERO_SERVICE_TOKEN:-local-dev-service-token}"
      REVALIDATE_SECRET: "${REVALIDATE_SECRET:-local-dev-revalidate-secret}"
      GROKRXIV_PUBLIC_URL: "${GROKRXIV_PUBLIC_URL:-https://grokrxiv.org}"
      GROKRXIV_BILLING_ENABLED: "${GROKRXIV_BILLING_ENABLED:-0}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_SUPPORTER_PRICE_ID: "${STRIPE_SUPPORTER_PRICE_ID:-}"
      STRIPE_RESEARCHER_PRICE_ID: "${STRIPE_RESEARCHER_PRICE_ID:-}"
      GROKRXIV_SUPER_ADMIN_EMAIL: "${GROKRXIV_SUPER_ADMIN_EMAIL:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../../..:/workspace
      - web-node-modules:/workspace/agenthero/apps/grokrxiv/web/node_modules
      - web-root-node-modules:/workspace/node_modules
    ports:
      - "3000:3000"
    command:
      - sh
      - -c
      - |
        set -eu
        corepack enable
        corepack prepare pnpm@9.12.0 --activate
        pnpm install --prefer-frozen-lockfile
        pnpm --filter @grokrxiv/web dev

volumes:
  web-node-modules:
  web-root-node-modules:
